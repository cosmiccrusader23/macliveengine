<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Waves - MacLiveEngine Sample</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <canvas id="waves"></canvas>
    
    <script>
        const canvas = document.getElementById('waves');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);
        
        // Wave parameters
        const waves = [
            { amplitude: 50, frequency: 0.02, speed: 0.02, color: 'rgba(233, 69, 96, 0.3)', offset: 0 },
            { amplitude: 40, frequency: 0.025, speed: 0.015, color: 'rgba(84, 178, 211, 0.3)', offset: 100 },
            { amplitude: 60, frequency: 0.015, speed: 0.025, color: 'rgba(148, 0, 211, 0.25)', offset: 200 },
            { amplitude: 35, frequency: 0.03, speed: 0.01, color: 'rgba(64, 224, 208, 0.2)', offset: 150 },
        ];
        
        function drawWave(wave, yBase) {
            ctx.beginPath();
            ctx.moveTo(0, height);
            
            for (let x = 0; x <= width; x += 5) {
                const y = yBase + 
                    Math.sin(x * wave.frequency + time * wave.speed) * wave.amplitude +
                    Math.sin(x * wave.frequency * 0.5 + time * wave.speed * 1.5) * wave.amplitude * 0.5;
                ctx.lineTo(x, y);
            }
            
            ctx.lineTo(width, height);
            ctx.closePath();
            
            ctx.fillStyle = wave.color;
            ctx.fill();
        }
        
        function draw() {
            // Clear with gradient
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // Draw waves from back to front
            waves.forEach((wave, index) => {
                const yBase = height * 0.5 + wave.offset;
                drawWave(wave, yBase);
            });
            
            // Floating particles
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(time * 0.5 + i * 0.5) * 0.5 + 0.5) * width;
                const y = (Math.cos(time * 0.3 + i * 0.7) * 0.5 + 0.5) * height;
                const size = Math.sin(time + i) * 1.5 + 2;
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            
            time += 0.5;
            requestAnimationFrame(draw);
        }
        
        draw();
    </script>
</body>
</html>
